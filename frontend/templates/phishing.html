<div class="phishing-container">
    <div class="phishing-header">
        <h1><i data-lucide="fish"></i> Simulation Phishing</h1>
        <p>Testez votre capacité à détecter les tentatives d'hameçonnage</p>
    </div>

    <div class="phishing-stats" id="phishingStats">
        <div class="stat-card">
            <i data-lucide="target"></i>
            <div class="stat-info">
                <span class="stat-value" id="phishingTotal">0</span>
                <span class="stat-label">Scénarios testés</span>
            </div>
        </div>
        <div class="stat-card">
            <i data-lucide="check-circle"></i>
            <div class="stat-info">
                <span class="stat-value" id="phishingCorrect">0</span>
                <span class="stat-label">Bonnes réponses</span>
            </div>
        </div>
        <div class="stat-card">
            <i data-lucide="percent"></i>
            <div class="stat-info">
                <span class="stat-value" id="phishingRate">0%</span>
                <span class="stat-label">Taux de réussite</span>
            </div>
        </div>
        <div class="stat-card">
            <i data-lucide="clock"></i>
            <div class="stat-info">
                <span class="stat-value" id="phishingTime">0s</span>
                <span class="stat-label">Temps moyen</span>
            </div>
        </div>
    </div>

    <div class="phishing-scenarios">
        <h2><i data-lucide="list"></i> Scénarios disponibles</h2>
        <div class="scenarios-grid" id="scenariosGrid">
            <!-- Scénarios chargés dynamiquement -->
        </div>
    </div>

    <!-- Modal pour le scénario -->
    <div class="modal" id="scenarioModal">
        <div class="modal-content scenario-modal">
            

            <div id="scenarioContent">
                <!-- Contenu du scénario chargé ici -->
            </div>

            <div id="scenarioResult" style="display: none;">
                <!-- Résultat affiché ici -->
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="frontend/css/templates/phishing.css">
