<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — Cybersens</title>
  <meta name="description" content="Créez votre compte Cybersens." />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="min-h-screen bg-slate-950">
  <!-- Header (shared) -->
  <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-sm fixed top-0 left-0 right-0 z-50">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="shield" class="w-8 h-8 text-cyan-400"></i>
        <a href="index.html" class="text-white text-xl">Cybersens</a>
      </div>
      <nav class="hidden md:flex items-center gap-6">
        <a href="index.html#accueil" class="text-slate-300 hover:text-cyan-400 transition-colors">Accueil</a>
        <a href="cours.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Cours</a>
        <a href="quiz.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Quiz</a>
        <a href="leaderboard.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Leaderboard</a>
        <a href="aide.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Aide</a>
      </nav>
      <div class="flex items-center gap-4">
        <a href="login.html" class="hidden md:inline-flex text-slate-300 hover:text-cyan-400 transition-colors px-3 py-2 rounded-md">Connexion</a>
        <a href="signup.html" class="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-md">S'inscrire</a>
        <button id="open-mobile" aria-label="Ouvrir le menu" class="md:hidden text-slate-300 px-2 py-2 rounded-md">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
      </div>
    </div>
    <div id="mobile-menu" class="md:hidden hidden border-t border-slate-800 bg-slate-950">
      <div class="container mx-auto px-4 py-4 flex flex-col gap-3">
        <a href="index.html#accueil" class="text-slate-300 hover:text-cyan-400 transition-colors">Accueil</a>
        <a href="cours.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Cours</a>
        <a href="quiz.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Quiz</a>
        <a href="leaderboard.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Leaderboard</a>
        <a href="aide.html" class="text-slate-300 hover:text-cyan-400 transition-colors">Aide</a>
        <div class="flex gap-3 pt-2">
          <a href="login.html" class="flex-1 bg-slate-800 text-slate-300 hover:bg-slate-800 px-4 py-2 rounded-md text-center">Connexion</a>
          <a href="signup.html" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-md text-center">S'inscrire</a>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-32 px-4">
    <div class="container mx-auto max-w-[calc(100%-2rem)] sm:max-w-lg">
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
        <h1 class="text-white text-3xl mb-6">Créer un compte</h1>
        <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='index.html';">
          <div>
            <label for="username" class="text-slate-300 block mb-2">Pseudo</label>
            <input id="username" required class="w-full bg-slate-950 border border-slate-800 text-white rounded-md px-4 py-2 focus:outline-hidden focus:ring-2 focus:ring-ring/50" placeholder="votre_pseudo" />
          </div>
          <div>
            <label for="email" class="text-slate-300 block mb-2">Email</label>
            <input id="email" type="email" required class="w-full bg-slate-950 border border-slate-800 text-white rounded-md px-4 py-2 focus:outline-hidden focus:ring-2 focus:ring-ring/50" placeholder="vous@exemple.com" />
          </div>
          <div>
            <label for="password" class="text-slate-300 block mb-2">Mot de passe</label>
            <input id="password" type="password" required class="w-full bg-slate-950 border border-slate-800 text-white rounded-md px-4 py-2 focus:outline-hidden focus:ring-2 focus:ring-ring/50" placeholder="••••••••" />
          </div>
          <div>
            <label for="confirm" class="text-slate-300 block mb-2">Confirmer le mot de passe</label>
            <input id="confirm" type="password" required class="w-full bg-slate-950 border border-slate-800 text-white rounded-md px-4 py-2 focus:outline-hidden focus:ring-2 focus:ring-ring/50" placeholder="••••••••" />
          </div>
          <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-md">Créer mon compte</button>
        </form>
        <p class="text-slate-400 text-sm mt-4">Vous avez déjà un compte ? <a class="text-cyan-400 hover:underline" href="login.html">Se connecter</a></p>
      </div>
    </div>
  </main>

  <footer class="bg-slate-900 border-t border-slate-800 py-12 px-4 mt-12">
    <div class="container mx-auto text-center text-slate-400">
      <p>&copy; 2025 Cybersens. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../main.js"></script>
</body>
</html>
