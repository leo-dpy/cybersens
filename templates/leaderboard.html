<h1>Classement des <span class="text-gradient">Cyber-Agents</span></h1>
<p class="subtitle">Les meilleurs défenseurs du cyberespace. Grimpez dans le classement !</p>

<div class="leaderboard-stats" style="display: flex; gap: 2rem; justify-content: center; margin-bottom: 2rem;">
    <div class="stat-card"
        style="text-align: center; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 12px;">
        <span class="stat-value" id="lb-total-users" style="font-size: 2rem; color: var(--primary-color);">0</span>
        <span class="stat-label" style="display: block; color: var(--text-secondary);">Participants</span>
    </div>
    <div class="stat-card"
        style="text-align: center; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 12px;">
        <span class="stat-value" id="lb-total-xp" style="font-size: 2rem; color: var(--accent-color);">0</span>
        <span class="stat-label" style="display: block; color: var(--text-secondary);">XP Total</span>
    </div>
</div>

<div id="lb-group-container" class="card ranking-table-container" style="max-width: 900px; margin: 0 auto; padding: 0;">
    <div class="table-responsive">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Utilisateur</th>
                    <th>Niveau</th>
                    <th>XP</th>
                    <th>Cours</th>
                    <th>Badges</th>
                </tr>
            </thead>
            <tbody id="group-leaderboard-list">
                <!-- Rempli par JS -->
            </tbody>
        </table>
    </div>
</div>
