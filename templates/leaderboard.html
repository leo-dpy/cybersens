<h1>Classement des <span class="text-gradient">Cyber-Agents</span></h1>
<p class="subtitle">Les meilleurs défenseurs du cyberespace. Grimpez dans le classement !</p>

<link rel="stylesheet" href="css/templates/leaderboard.css">

<div class="leaderboard-stats">
    <div class="stat-card">
        <span class="stat-value" id="lb-total-users">0</span>
        <span class="stat-label">Participants</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" id="lb-total-xp">0</span>
        <span class="stat-label">XP Total</span>
    </div>
</div>

<div id="lb-group-container" class="card ranking-table-container">
    <div class="table-responsive">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Utilisateur</th>
                    <th>Niveau</th>
                    <th>XP</th>
                    <th>Cours</th>
                    <th>Badges</th>
                </tr>
            </thead>
            <tbody id="group-leaderboard-list">
                <!-- Rempli par JS -->
            </tbody>
        </table>
    </div>
</div>
