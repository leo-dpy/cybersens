<div class="resources-container">
    <div class="resources-header">
        <h1><i data-lucide="book-open"></i> Ressources</h1>
        <p>Documentation, outils et liens utiles pour approfondir vos connaissances</p>
    </div>

    <div class="resources-filters">
        <div class="filter-group">
            <label>Catégorie</label>
            <select id="resourceCategoryFilter" onchange="filterResources()">
                <option value="">Toutes</option>
                <option value="article">📝 Articles</option>
                <option value="video">🎬 Vidéos</option>
                <option value="tool">🛠️ Outils</option>
                <option value="documentation">📚 Documentation</option>
                <option value="external">🔗 Liens externes</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Niveau</label>
            <select id="resourceDifficultyFilter" onchange="filterResources()">
                <option value="">Tous</option>
                <option value="debutant">Débutant</option>
                <option value="intermediaire">Intermédiaire</option>
                <option value="avance">Avancé</option>
            </select>
        </div>
    </div>

    <div class="resources-content" id="resourcesContent">
        <!-- Ressources chargées dynamiquement -->
    </div>

    <!-- Modal pour article -->
    <div class="modal" id="resourceModal">
        <div class="modal-content resource-modal">
            <button class="modal-close" onclick="closeResourceModal()">&times;</button>
            <div id="resourceModalContent">
                <!-- Contenu de la ressource chargé ici -->
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="css/templates/ressources.css">
